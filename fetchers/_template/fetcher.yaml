# Template fetcher.yaml. Copy this directory to fetchers/<category>/<short_name>/
# and fill in the placeholders. See docs/porting_playbook.md for the full procedure.
#
# Validated against framework/schemas/fetcher_schema.json.

name: <category>_<short_name>            # globally unique (e.g. okta_phishing_resistant_mfa)
version: 0.1.0                            # 0.x.y for pre-contract-conformant ports
description: <one or two sentences describing what evidence this collects>
category: <category>                      # matches the parent directory

runtime:
  type: python                            # or bash
  entry: fetcher.py                       # or fetcher.sh

output:
  type: json                              # json | csv | html
  path: <category>_<short_name>.json      # relative filename inside EVIDENCE_DIR

secrets:
  - name: api_token
    env: <UPPER_SNAKE_ENV_VAR>
  # Add one entry per env var the fetcher (or its shared modules) reads.
