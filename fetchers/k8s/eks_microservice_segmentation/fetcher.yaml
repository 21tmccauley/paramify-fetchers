name: k8s_eks_microservice_segmentation
version: 0.1.0
description: For each EKS cluster in the account/region, collects default-deny network policies, VPC CNI configuration, security group policies, worker node security groups, and pod resource limits. Evidence for microservice segmentation.
category: k8s

supports_targets: false

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: k8s_eks_microservice_segmentation.json

secrets:
- name: aws_profile
  env: AWS_PROFILE
- name: aws_region
  env: AWS_DEFAULT_REGION

evidence_set:
  reference_id: EVD-EKS-MICROSERVICE-SEG
  name: EKS Microservice Segmentation
  instructions: 'Script: eks_microservice_segmentation.sh. Commands executed: kubectl get networkpolicies, kubectl describe daemonset aws-node, aws ec2 describe-instances'
