name: sentinelone_xdr_assets
version: 0.1.0
description: Pulls SentinelOne XDR asset inventory with health and region breakdowns.
category: sentinelone

supports_targets: false

runtime:
  type: python
  entry: fetcher.py

output:
  type: json
  path: sentinelone_xdr_assets.json

secrets:
- name: api_token
  env: SENTINELONE_API_TOKEN
- name: api_url
  env: SENTINELONE_API_URL

evidence_set:
  reference_id: EVD-S1-XDR-ASSET
  name: SentinelOne XDR Assets
  instructions: 'Script: xdrassetfetcher.py. Calls the SentinelOne API endpoint /web/api/v2.1/xdr/assets, supports cursor pagination, summarizes infectionStatus and assetStatus, writes JSON and CSV summary.'
