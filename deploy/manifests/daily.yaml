# EXAMPLE daily-cadence manifest. Edit it to your stack.
# Pick fetchers with `paramify list`; see what each needs with `paramify describe <name>`.
# Secrets are referenced as ${env:VAR} and resolved from the environment at run time.
run:
  output_dir: ./evidence        # -> /app/evidence in the container (mounted to host)

  fetchers:
    - use: okta_phishing_resistant_mfa
      secrets:
        api_token: ${env:OKTA_API_TOKEN}
        org_url: ${env:OKTA_ORG_URL}
