# EXAMPLE weekly-cadence manifest (heavier / less frequent collections).
# This one shows a fan-out fetcher (one run per target). Edit to your stack.
run:
  output_dir: ./evidence

  fetchers:
    - use: gitlab_ci_cd_pipeline_config
      targets:
        - project_id: group/change-management
          url: https://gitlab.example.com
          secrets:
            api_token: ${env:GITLAB_TOKEN_1}
