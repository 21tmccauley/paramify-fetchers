# AWS cadence manifest — mounted into deploy/k8s/cronjob-aws.yaml.
#
# DEFAULT: ambient single-account. The Pod's identity (EKS IRSA locally a mounted
# credentials file) collects the account it runs in — no profiles. For multi-
# account, add a `profile:` per target that names a profile in the aws-config
# ConfigMap (see deploy/k8s/AWS_MULTI_ACCOUNT.md + deploy/k8s/terraform/).
run:
  output_dir: ./evidence

  fetchers:
    # GLOBAL services — one ambient run each (no targets[]).
    - use: aws_iam_roles
    - use: aws_s3_encryption_status

    # REGIONAL services — ambient identity, but you pick the region(s).
    - use: aws_guard_duty
      targets:
        - region: us-east-1
    - use: aws_security_groups
      targets:
        - region: us-east-1

  # ---- Multi-account fanout (uncomment; needs profiles in the aws-config ConfigMap) ----
  #  - use: aws_guard_duty
  #    targets:
  #      - { profile: acct-prod, region: us-east-1 }
  #      - { profile: acct-dev,  region: us-east-1 }
  #  - use: aws_iam_roles            # global — one target per account, no region
  #    targets:
  #      - { profile: acct-prod }
  #      - { profile: acct-dev }
