# Example ~/.aws/config — the multi-account assume-role "profile map".
#
# Mounted by deploy/k8s/cronjob-aws.yaml at /root/.aws/config. Each manifest
# target's `profile:` names a profile here; the AWS CLI resolves it via its
# credential chain (no keys in this file). HARMLESS for the ambient single-
# account case — if no target names a profile, this file is simply never read.
#
# The `home` profile IS the Pod's IRSA identity (the projected web-identity
# token). Each account profile assumes that account's read-only role using
# `home` as the source. Fill in real account IDs (the Terraform in
# deploy/k8s/terraform/ provisions HomeRole + the per-account TargetRoles).
#
# Apply:  kubectl apply -f deploy/k8s/aws-config.configmap.yaml
# (this manifest embeds the example config below — edit the account IDs first).
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-config
data:
  config: |
    # Base identity = IRSA. The webhook injects this token file into the Pod.
    [profile home]
    web_identity_token_file = /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    role_arn = arn:aws:iam::<EKS_ACCOUNT_ID>:role/paramify-fetchers

    # One profile per target account — assumes that account's read-only role,
    # sourced from `home`. The manifest references these by the [profile <name>] name.
    [profile acct-prod]
    role_arn = arn:aws:iam::<PROD_ACCOUNT_ID>:role/paramify-readonly
    source_profile = home
    # external_id = <id>      # if the TargetRole trust policy requires one

    [profile acct-dev]
    role_arn = arn:aws:iam::<DEV_ACCOUNT_ID>:role/paramify-readonly
    source_profile = home
