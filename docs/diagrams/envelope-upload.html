:root{
  --paper:#fafafa; --surface:#ffffff;
  --ink:#1f1f1f; --ink-2:#595959; --ink-3:#8c8c8c;
  --hair:#ececec; --hair-2:#d9d9d9;
  --accent:#1467ff; --accent-deep:#004bd6; --wash:#eef4ff; --navy:#101828;
  --display:"Open Sauce Sans",system-ui,-apple-system,"Segoe UI",sans-serif;
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:var(--display);font-weight:400;font-size:16px;line-height:1.5;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

.page{max-width:1320px;margin:0 auto;padding:24px 28px}

.masthead{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:16px}
.brandline{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);margin-bottom:7px}
.deck-title{font-weight:700;font-size:25px;line-height:1;letter-spacing:-.02em;margin:0}
.home{font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;color:var(--ink-2);text-decoration:none;white-space:nowrap}
.home:hover{color:var(--accent)}

.stage{background:var(--surface);border:1px solid var(--hair-2);border-radius:8px;padding:14px 16px;
  display:flex;align-items:center;justify-content:center;overflow:auto}
svg{width:100%;height:auto;display:block;max-width:100%}

.zone-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;fill:var(--ink-3)}
.boundary{stroke:#cbd3df;stroke-width:1.4;stroke-dasharray:2 6}
.node rect{fill:#fff;stroke:var(--hair-2);stroke-width:1.3;transition:stroke .3s,fill .3s}
.node .t{fill:var(--ink);font-weight:600;font-size:16px;text-anchor:middle;transition:fill .3s}
.node .s{fill:var(--ink-3);font-family:var(--mono);font-size:11.5px;text-anchor:middle;transition:fill .3s}
.node.dim rect{stroke:#eee;fill:#fcfcfc}
.node.dim .t{fill:#c2c2c2}
.node.dim .s{fill:#d4d4d4}
.node.active rect{stroke:var(--accent);stroke-width:1.7;fill:var(--wash)}
.node.active .t{fill:var(--navy);font-weight:700}
.node.active .s{fill:var(--accent)}
.edge path{fill:none;stroke:var(--hair-2);stroke-width:1.4;transition:stroke .3s}
.edge.dim path{stroke:#ececec}
.edge.active path{stroke:var(--accent);stroke-width:1.9}
.doc-box{fill:#fff;stroke:var(--hair-2);stroke-width:1.3}
.doc-bar{fill:#f4f5f7}
.doc-title{fill:var(--ink-2);font-family:var(--mono);font-size:12px}
.brace{fill:#c4c4c4;font-family:var(--mono);font-size:14px}
.yaml text{font-family:var(--mono);font-size:14px;fill:var(--ink-3);transition:fill .3s}
.yaml .k{fill:var(--ink-3);transition:fill .3s}
.yaml.dim text{fill:#cfcfcf}
.yaml.active text{fill:var(--ink)}
.yaml.active .k{fill:var(--accent)}

.shelf{margin-top:20px}
.panel.in{animation:rise .26s cubic-bezier(.2,.7,.3,1)}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.step-head{display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:center;margin-bottom:14px}
.numeral{font-weight:800;font-size:44px;line-height:.8;color:#dfe7f2;letter-spacing:-.03em}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px}
.step-title{font-weight:700;font-size:22px;line-height:1.1;letter-spacing:-.015em;margin:0}
.intro{font-size:16px;color:var(--ink-2);max-width:72ch;margin:0}
.intro b{color:var(--ink);font-weight:600}

.rdp{margin:0;border-top:1px solid var(--hair)}
.rdp > div{display:grid;grid-template-columns:108px 1fr;gap:16px;padding:12px 2px;border-bottom:1px solid var(--hair)}
.rdp dt{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin:0;padding-top:2px}
.rdp dd{margin:0;color:var(--ink-2);font-size:14.5px;line-height:1.5}
.rdp dd b{color:var(--ink);font-weight:600}
code{font-family:var(--mono);font-size:.85em;background:#f0f2f5;padding:1px 5px;border-radius:4px;color:var(--ink)}

.note{margin-top:14px;padding:10px 14px;background:var(--wash);border-left:2px solid var(--accent);
  color:#2c3a55;font-size:13.5px;border-radius:0 5px 5px 0}
.source{margin-top:12px;font-family:var(--mono);font-size:12px;color:var(--ink-3);white-space:pre-line}
.source b{color:var(--ink-2);font-weight:600;text-transform:uppercase;letter-spacing:.1em;font-size:10px}

.bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:22px;padding-top:16px;border-top:1px solid var(--hair)}
.bar button{font-family:var(--display);font-weight:600;font-size:13px;color:var(--ink);background:none;
  border:1px solid var(--hair-2);padding:8px 15px;border-radius:5px;cursor:pointer;transition:all .18s}
.bar button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.bar button:disabled{opacity:.35;cursor:default}
.bar #auto{border-color:transparent;color:var(--accent)}
.bar #auto:hover{background:var(--wash)}
.count{font-family:var(--mono);font-size:12px;color:var(--ink-3);margin-right:auto}
.rail{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.rlab{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);margin-right:4px}
.rail button{all:unset;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--ink-3);
  min-width:28px;height:28px;padding:0 4px;display:grid;place-items:center;border:1px solid var(--hair-2);border-radius:6px;transition:all .16s}
.rail button:hover{border-color:var(--accent);color:var(--accent)}
.rail button.on{background:var(--accent);border-color:var(--accent);color:#fff}

@media(min-width:1000px) and (min-height:640px){
  .page{height:100dvh;display:flex;flex-direction:column;overflow:hidden;padding-top:22px;padding-bottom:16px}
  .masthead{flex:0 0 auto;margin-bottom:12px}
  .stage{flex:1 1 auto;min-height:0;padding:8px 12px}
  .stage svg{height:100%;width:100%}
  .shelf{flex:0 0 auto;margin-top:14px}
  .panel{height:250px;overflow:auto;padding-right:6px}
  .step-head{margin-bottom:10px}
  .numeral{font-size:38px}
  .rdp{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;padding-top:12px}
  .rdp > div{display:block;border:0;padding:0}
  .rdp dt{margin-bottom:5px}
  .rdp dd{font-size:14px;line-height:1.45}
  .note{margin-top:12px}
  .bar{flex:0 0 auto;margin-top:12px;padding-top:12px}
}
@media(prefers-reduced-motion:reduce){ .panel.in{animation:none} }
</style>

<div class="page">
  <header class="masthead">
    <div>
      <div class="brandline">Paramify · Evidence fetchers</div>
      <h1 class="deck-title">The evidence envelope &amp; upload</h1>
    </div>
    <a class="home" href="index.html">All walkthroughs ↗</a>
  </header>

  <figure class="stage" style="margin:0">
    <svg id="svg" viewBox="0 0 1180 600" role="img" aria-label="Envelope and upload flow">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c2c8d0"/></marker>
        <marker id="arrowA" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1467ff"/></marker>
      </defs>

      <text class="zone-label" x="28" y="44">ON YOUR INFRASTRUCTURE</text>
      <text class="zone-label" x="808" y="44">PARAMIFY</text>
      <rect x="14" y="58" width="762" height="510" rx="10" fill="#fcfcfd" stroke="#eef0f3"/>
      <rect x="800" y="58" width="366" height="510" rx="10" fill="#f5f8fe" stroke="#e4ecfa"/>
      <line class="boundary" x1="790" y1="66" x2="790" y2="560"/>

      <g class="edge" id="e-raw-env"><path d="M210,292 L250,300" marker-end="url(#arrow)"/></g>
      <g class="edge" id="e-doc-index"><path d="M300,505 L216,448" marker-end="url(#arrow)"/></g>
      <g class="edge" id="e-env-upload"><path d="M710,300 L840,196" marker-end="url(#arrow)"/></g>
      <g class="edge" id="e-upload-evset"><path d="M990,234 L990,300" marker-end="url(#arrow)"/></g>
      <g class="edge" id="e-evset-artifact"><path d="M990,384 L990,450" marker-end="url(#arrow)"/></g>

      <rect class="doc-box" x="250" y="70" width="460" height="470" rx="8"/>
      <rect class="doc-bar" x="250" y="70" width="460" height="34" rx="8"/>
      <rect class="doc-bar" x="250" y="90" width="460" height="14"/>
      <text class="doc-title" x="270" y="92">evidence file · the envelope</text>
      <text class="brace" x="270" y="134">{</text>
      <text class="brace" x="270" y="462">}</text>

      <g class="node yaml" id="g-schema">
        <text x="270" y="164">  <tspan class="k">"schema_version":</tspan> "1.0",</text>
      </g>
      <g class="node yaml" id="g-meta">
        <text x="270" y="198">  <tspan class="k">"metadata":</tspan> {</text>
        <text x="270" y="226">    fetcher_name, version, target,</text>
        <text x="270" y="254">    collected_at, status, exit_code,</text>
        <text x="270" y="282">    evidence_set: { reference_id,</text>
        <text x="270" y="310">                   name, instructions }</text>
        <text x="270" y="338">  },</text>
      </g>
      <g class="node yaml" id="g-payload">
        <text x="270" y="374">  <tspan class="k">"payload":</tspan> {</text>
        <text x="270" y="402">    …raw fetcher output (untouched)…</text>
        <text x="270" y="430">  }</text>
      </g>

      <g class="node" id="n-raw">
        <rect x="40" y="250" width="170" height="84" rx="6"/>
        <text class="t" x="125" y="288">Raw JSON</text>
        <text class="s" x="125" y="310">fetcher output</text>
      </g>
      <g class="node" id="n-index">
        <rect x="40" y="430" width="210" height="74" rx="6"/>
        <text class="t" x="145" y="463">_run_metadata.json</text>
        <text class="s" x="145" y="484">run index · audit trail</text>
      </g>

      <g class="node" id="n-upload">
        <rect x="840" y="150" width="300" height="84" rx="6"/>
        <text class="t" x="990" y="188">paramify upload</text>
        <text class="s" x="990" y="210">reads enveloped files</text>
      </g>
      <g class="node" id="n-evset">
        <rect x="840" y="300" width="300" height="84" rx="6"/>
        <text class="t" x="990" y="338">Evidence set</text>
        <text class="s" x="990" y="360">get-or-create by reference_id</text>
      </g>
      <g class="node" id="n-artifact">
        <rect x="840" y="450" width="300" height="84" rx="6"/>
        <text class="t" x="990" y="488">Artifact</text>
        <text class="s" x="990" y="510">idempotent per run_id</text>
      </g>
    </svg>
  </figure>

  <section class="shelf">
    <div class="panel in" id="panel"></div>
  </section>

  <nav class="bar" aria-label="Steps">
    <button id="prev">Previous</button>
    <button id="next">Next</button>
    <span class="count" id="count"></span>
    <span class="rail" id="rail"><span class="rlab">Steps</span></span>
    <button id="auto">Auto-play</button>
  </nav>
</div>

<script>
const STEPS = [
  {
    kicker:"OVERVIEW", label:"Overview", title:"From raw output to filed evidence",
    overview:true,
    intro:"A fetcher only knows how to collect — it writes plain JSON. The runner then wraps every output in a standard <b>envelope</b> so each file carries its own provenance, and records a run index. Later, a separate <code>paramify upload</code> step files those files as artifacts in Paramify. Everything left of the dashed line is still on <b>your</b> infrastructure.",
    nodes:[], edges:[]
  },
  {
    kicker:"RAW", label:"Raw output", title:"The fetcher writes raw JSON",
    reads:"Whatever the fetcher collected from the tool's API.",
    does:"A fetcher's only job is collection — it emits plain JSON to the run directory and stops. It adds no metadata of its own.",
    produces:"Raw, un-annotated evidence on disk.",
    file:"framework/runner/executor.py  (detects newly-written files)",
    nodes:["n-raw"], edges:[]
  },
  {
    kicker:"WRAP", label:"Envelope", title:"Wrap it in the envelope",
    reads:"Each raw JSON output file.",
    does:"The runner wraps the file as <code>{ schema_version, metadata, payload }</code>. <code>schema_version</code> pins the envelope format — versioned separately from the fetcher itself, so the format can evolve safely.",
    produces:"A versioned, self-describing evidence file.",
    file:"framework/envelope.py → wrap_outputs()",
    nodes:["n-raw","g-schema"], edges:["e-raw-env"]
  },
  {
    kicker:"PROVENANCE", label:"Metadata", title:"Metadata records the context",
    reads:"The invocation result, plus the fetcher's <code>evidence_set</code> identity.",
    does:"<code>metadata</code> captures provenance: which fetcher and version, which target, when it was collected, the status / exit code, and the <code>evidence_set</code> (reference_id, name, instructions) that ties the file to a control.",
    produces:"Everything Paramify needs to file the evidence correctly.",
    file:"framework/envelope.py → build_metadata()",
    nodes:["g-meta"], edges:[]
  },
  {
    kicker:"PAYLOAD", label:"Payload", title:"The original evidence, untouched",
    reads:"The raw JSON from the first step.",
    does:"The fetcher's output is preserved verbatim under <code>payload</code> — nothing is rewritten. Wrapping is idempotent: an already-enveloped file is left alone, so re-runs never double-wrap.",
    produces:"The evidence itself, auditable and unmodified.",
    file:"framework/envelope.py → wrap_outputs() (skips wrapped files)",
    nodes:["g-payload","n-raw"], edges:["e-raw-env"]
  },
  {
    kicker:"INDEX", label:"Run index", title:"Record the run index",
    reads:"Every invocation's result for this run.",
    does:"Alongside the evidence files, the runner writes <code>_run_metadata.json</code> — a per-run index of what ran, when, and with what exit codes. It is not enveloped; it's the run's audit trail.",
    produces:"A manifest of the run itself.",
    file:"evidence/run-&lt;timestamp&gt;/_run_metadata.json",
    nodes:["n-index"], edges:["e-doc-index"]
  },
  {
    kicker:"UPLOAD", label:"Upload", title:"Find or create the evidence set",
    reads:"The enveloped files, plus <code>PARAMIFY_UPLOAD_API_TOKEN</code>.",
    does:"<code>paramify upload</code> reads each envelope and locates its evidence set in Paramify by <code>reference_id</code> — creating it if it doesn't exist yet. This is the only step that crosses into Paramify.",
    produces:"A matched (or freshly created) evidence set.",
    note:"Upload is a separate, opt-in step. Fetchers run and produce evidence even if you never upload.",
    file:"uploaders/paramify_evidence/uploader.py",
    nodes:["n-upload","n-evset"], edges:["e-env-upload","e-upload-evset"]
  },
  {
    kicker:"ARTIFACT", label:"Artifact", title:"Upload each artifact, once",
    reads:"Each evidence file, plus its <code>run_id</code>.",
    does:"Each file is uploaded as an artifact on the evidence set. If an artifact with the same filename and run_id already exists, it's skipped — so re-uploading the same run is a safe no-op.",
    produces:"Evidence artifacts in Paramify, linked to your controls.",
    file:"uploaders/paramify_evidence/uploader.py",
    nodes:["n-artifact"], edges:["e-evset-artifact"]
  }
];

const svg=document.getElementById('svg');
const panel=document.getElementById('panel');
const railEl=document.getElementById('rail');
const countEl=document.getElementById('count');
const prevB=document.getElementById('prev'), nextB=document.getElementById('next'), autoB=document.getElementById('auto');
const allNodes=[...svg.querySelectorAll('.node')];
const allEdges=[...svg.querySelectorAll('.edge')];
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
let i=0, timer=null;

STEPS.forEach((s,k)=>{
  const b=document.createElement('button');
  b.textContent=String(k).padStart(2,'0');
  b.title=s.label; b.setAttribute('aria-label',s.label);
  b.onclick=()=>{stop();go(k);};
  railEl.appendChild(b);
});
const railItems=[...railEl.querySelectorAll('button')];

function setEdge(g,active){
  const p=g.querySelector('path');
  const m=active?'url(#arrowA)':'url(#arrow)';
  if(p.hasAttribute('marker-end')) p.setAttribute('marker-end',m);
  if(p.hasAttribute('marker-start')) p.setAttribute('marker-start',m);
  if(active && !reduce){
    const len=p.getTotalLength();
    p.style.transition='none'; p.style.strokeDasharray=len; p.style.strokeDashoffset=len;
    void p.getBoundingClientRect();
    p.style.transition='stroke-dashoffset .55s ease'; p.style.strokeDashoffset='0';
  }else{
    p.style.transition='none'; p.style.strokeDasharray='none'; p.style.strokeDashoffset='0';
  }
}

function render(s){
  const num=String(i).padStart(2,'0');
  let html=`<div class="step-head"><div class="numeral">${num}</div><div><div class="eyebrow">${s.kicker}</div><h2 class="step-title">${s.title}</h2></div></div>`;
  if(s.overview){
    html+=`<p class="intro">${s.intro}</p>`;
  }else{
    html+=`<dl class="rdp">
      <div><dt>Reads</dt><dd>${s.reads}</dd></div>
      <div><dt>Does</dt><dd>${s.does}</dd></div>
      <div><dt>Produces</dt><dd>${s.produces}</dd></div></dl>`;
  }
  if(s.note) html+=`<div class="note">${s.note}</div>`;
  if(s.file) html+=`<div class="source"><b>${s.footLabel||'source'}</b>\n${s.file}</div>`;
  panel.innerHTML=html;
  panel.classList.remove('in'); void panel.offsetWidth; panel.classList.add('in');
}

function go(n){
  i=Math.max(0,Math.min(STEPS.length-1,n));
  const s=STEPS[i];
  const isOv=!!s.overview;
  allNodes.forEach(g=>{
    g.classList.toggle('active',s.nodes.includes(g.id));
    g.classList.toggle('dim',!isOv && !s.nodes.includes(g.id));
  });
  allEdges.forEach(g=>{
    const active=s.edges.includes(g.id);
    g.classList.toggle('active',active);
    g.classList.toggle('dim',!isOv && !active);
    setEdge(g,active);
  });
  render(s);
  railItems.forEach((b,k)=>b.classList.toggle('on',k===i));
  countEl.textContent=(i+1)+' / '+STEPS.length;
  prevB.disabled=i===0; nextB.disabled=i===STEPS.length-1;
}
function stop(){ if(timer){clearInterval(timer);timer=null;autoB.textContent='Auto-play';} }
function play(){
  if(timer){stop();return;}
  autoB.textContent='Stop';
  timer=setInterval(()=>{ if(i>=STEPS.length-1){stop();return;} go(i+1); },3600);
}
prevB.onclick=()=>{stop();go(i-1);};
nextB.onclick=()=>{stop();go(i+1);};
autoB.onclick=play;
addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();stop();go(i+1);}
  else if(e.key==='ArrowLeft'){e.preventDefault();stop();go(i-1);}
});
go(0);
</script>
