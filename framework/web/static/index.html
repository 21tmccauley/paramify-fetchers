<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paramify Fetcher Console</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Paramify <span>Fetcher Console</span></div>
    <div class="run-controls">
      <label class="field inline">
        <span>output dir</span>
        <input id="output-dir" type="text" value="./evidence" />
      </label>
      <label class="field inline">
        <span>manifest file</span>
        <input id="manifest-path" type="text" value="manifest.yaml" />
      </label>
      <select id="example-picker" title="Load an example manifest">
        <option value="">Load example…</option>
      </select>
      <button id="btn-validate" class="btn">Validate</button>
      <button id="btn-save" class="btn">Save</button>
      <button id="btn-run" class="btn btn-primary">Run ▸</button>
    </div>
  </header>

  <div id="banner" class="banner hidden"></div>

  <main class="layout">
    <aside class="sidebar">
      <input id="catalog-search" class="search" type="text" placeholder="Filter fetchers…" />
      <div id="catalog"></div>
    </aside>

    <section class="builder">
      <h2>Manifest</h2>
      <div id="platforms"></div>
      <div id="entries"></div>
      <p id="empty-hint" class="hint">Pick fetchers from the left to build a manifest.</p>
      <details class="preview">
        <summary>Manifest preview (JSON)</summary>
        <pre id="preview"></pre>
      </details>
    </section>

    <section class="runpane">
      <h2>Run</h2>
      <div id="run-status" class="run-status">Idle.</div>
      <pre id="run-log" class="run-log"></pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
